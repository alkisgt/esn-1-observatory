# Saves your Adafruit sensor data into the repo forever, for free.
# Each run: (1) harvests new raw data into data.csv (full resolution, permanent archive),
#           (2) rebuilds hourly.csv (tiny summary the dashboard reads),
#           (3) commits both -- and that commit also keeps the schedule alive past 60 days.

name: Archive sensor data

on:
  schedule:
    - cron: "17 */12 * * *"   # every 12 hours, at minute :17 (UTC)
  workflow_dispatch:           # lets you run it by hand from the Actions tab

permissions:
  contents: write              # allows the job to commit back to the repo

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Harvest from Adafruit IO
        env:
          AIO_USER: alkisgt       # your Adafruit IO username
          AIO_FEED: mv-signal     # the feed key to archive
          AIO_KEY: ${{ secrets.AIO_KEY }}   # comes from the repository Secret (never in the code)
        run: python archive_adafruit.py

      - name: Build hourly summary for the dashboard
        run: python aggregate_hourly.py

      - name: Commit the new data
        run: |
          git config user.name  "esn-archiver"
          git config user.email "actions@users.noreply.github.com"
          git add data.csv hourly.csv
          if git diff --staged --quiet; then
            echo "No new data this run."
          else
            git commit -m "Archive sensor data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
